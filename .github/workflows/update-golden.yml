name: Update golden files

on:
  pull_request:
    types: [labeled]

jobs:
  update-golden:
    if: github.event.label.name == 'update-golden'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.mod') }}-staticcheck-v0.7.0
          restore-keys: |
            go-${{ runner.os }}-${{ hashFiles('go.mod') }}-

      - name: Regenerate golden files
        run: make golden

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/e2e/testdata/golden/
          git diff --cached --quiet && echo "No golden changes needed." || \
            git commit -m "chore: regenerate golden files"
          git push

      - name: Remove label
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                name: 'update-golden',
              });
            } catch (_) {
              // label may have already been removed — that's fine
            }

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- golden-test-result -->';
            const body = `## Golden files updated\n\nCI regenerated the golden files and pushed the result to this branch. The golden tests should now pass on the next CI run.\n\n${marker}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## Golden file update failed\n\nThe attempt to regenerate golden files failed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`,
            });
